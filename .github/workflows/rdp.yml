name: Linux RDP

on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Install Desktop & VNC
      run: |
        sudo apt-get update
        sudo apt-get install -y xfce4 xfce4-goodies tightvncserver novnc websockify

    - name: Set Password VNC
      run: |
        mkdir -p ~/.vnc
        echo "passwordkamu123" | vncpasswd -f > ~/.vnc/passwd
        chmod 600 ~/.vnc/passwd

    - name: Jalankan VNC Server
      run: |
        export USER=runner
        vncserver :1 -geometry 1280x800 -depth 24
        sleep 5

    - name: Jalankan noVNC (web access)
      run: |
        /usr/share/novnc/utils/novnc_proxy --vnc localhost:5901 --listen 6080 &
        sleep 5

    - name: Install & Jalankan Cloudflare Tunnel
      run: |
        wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
        sudo dpkg -i cloudflared-linux-amd64.deb
        cloudflared tunnel --url http://localhost:6080 > cloudflared.log 2>&1 &
        sleep 15
        for i in {1..10}; do
          if grep -q "trycloudflare.com" cloudflared.log; then
            echo "=========================================="
            echo "BUKA ALAMAT INI DI BROWSER:"
            grep -o 'https://[a-zA-Z0-9.-]*trycloudflare.com' cloudflared.log | head -1
            echo "=========================================="
            break
          fi
          echo "Menunggu tunnel... ($i)"
          sleep 5
        done

    - name: Keep Alive
      run: sleep 21000
